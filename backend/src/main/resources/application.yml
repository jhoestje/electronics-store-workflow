spring:
  datasource:
    url: jdbc:h2:mem:electronicsdb
    username: sa
    password: password
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  security:
    filter:
      order: 10

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: never
    include-binding-errors: never

jwt:
  secret: c2VjcmV0S2V5Rm9yRWxlY3Ryb25pY3NTdG9yZUFwcGxpY2F0aW9u
  expiration: 86400000

logging:
  level:
    org.springframework.security: WARN
    com.store.electronics: INFO
    org.springframework.web: WARN
